[[plugins]]
  package = "./plugins/netlify-plugin-cache-iiif"

[[headers]]
  for = "/iiif/*" # you can configure the correct paths here
  [headers.values]
    access-control-allow-origin = "*" # see a list of allowed values here: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Access-Control-Allow-Origin


[context.production.environment]
IIIF_URL = "https://nlw-data-foundry-website.netlify.app/iiif"
